name: review

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: install
        run: pip install ruff mypy
      - name: ruff
        run: ruff check src/
      - name: mypy
        run: mypy --ignore-missing-imports src/
